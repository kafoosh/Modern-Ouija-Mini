<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect x='1' y='1' width='30' height='30' rx='7' fill='%231C1C1E' stroke='%233A3A3C'/><path d='M11.5 15V12a4.5 4.5 0 0 1 9 0v3' fill='none' stroke='%23E6E6EA' stroke-width='2'/><rect x='9' y='15' width='14' height='11' rx='2.5' fill='%23E6E6EA'/><circle cx='16' cy='20' r='1.4' fill='%231C1C1E'/></svg>">
<title>Protected</title>
<style>
  /* ---------- shared ---------- */
  :root{
    /* Noir (NoirTheme.swift) */
    --letter-idle:#48484A; --letter-visited:#8E8E93; --letter-active:#ffffff;
    --control-stroke:#2C2C2E; --control-text:#8E8E93; --goodbye-fill:#1C1C1E;
    --instruction:#48484A;
    /* Dial (DialTheme.swift) */
    --dial-accent:#B3A6E0; --dial-needle:#B22222;
    --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro", system-ui, "Segoe UI", Roboto, sans-serif;
  }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{
    height:100%; width:100%; background:#000; color:var(--letter-idle);
    font-family:var(--font); overflow:hidden; position:fixed; inset:0;
    touch-action:none; overscroll-behavior:none; -webkit-user-select:none; user-select:none;
    transition:background .6s ease;
  }
  body[data-skin="dial"]{ background:#060607; }
  #wrap{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  #stage{ position:relative; }

  /* ---------- Noir board ---------- */
  .glyph{ position:absolute; transform:translate(-50%,-50%); color:var(--letter-idle);
    transition:color .45s ease, text-shadow .45s ease; white-space:nowrap; letter-spacing:.02em; }
  .glyph.letter{ font-weight:500; }
  .glyph.digit { font-weight:500; color:#3a3a3c; }
  .glyph.active{ color:var(--letter-active); text-shadow:0 0 14px rgba(255,255,255,.55),0 0 28px rgba(255,255,255,.25); }
  .glyph.visited{ color:var(--letter-visited); }
  .control{ position:absolute; transform:translate(-50%,-50%); display:flex; align-items:center; justify-content:center;
    border:1px solid var(--control-stroke); color:var(--control-text); border-radius:999px;
    letter-spacing:.18em; text-transform:uppercase; white-space:nowrap;
    transition:color .45s ease, border-color .45s ease, box-shadow .45s ease; }
  #goodbye{ background:var(--goodbye-fill); border-radius:14px; letter-spacing:.22em; }
  .control.active{ color:#fff; border-color:rgba(255,255,255,.7); box-shadow:0 0 22px rgba(255,255,255,.18); }
  .control.visited{ color:var(--letter-visited); }
  #planchette{ position:absolute; left:0; top:0; transform:translate(-50%,-50%);
    pointer-events:auto; cursor:grab; will-change:transform,filter; }
  #planchette svg{ display:block; overflow:visible; }

  /* ---------- Dial board ---------- */
  #dialLayer{ position:absolute; inset:0; pointer-events:auto; cursor:grab; }
  #dialLayer canvas{ position:absolute; left:0; top:0; }
  #dialStatic{ opacity:.5; mix-blend-mode:screen; }

  /* ---------- shared overlays ---------- */
  #readout{ position:absolute; left:50%; transform:translateX(-50%); text-align:center;
    color:#fff; font-weight:300; letter-spacing:.38em; white-space:nowrap; min-height:1em;
    text-shadow:0 0 18px rgba(255,255,255,.25); pointer-events:none; }
  #caret{ display:inline-block; width:2px; background:#fff; margin-left:.1em; vertical-align:middle;
    opacity:0; animation:blink 1s steps(1,end) infinite; }
  #readout.writing #caret{ opacity:.85; }
  @keyframes blink{ 50%{ opacity:0; } }
  #presence{ position:absolute; left:50%; transform:translateX(-50%); opacity:.55; pointer-events:none; }
  #hint{ position:absolute; left:50%; bottom:5%; transform:translateX(-50%); color:var(--instruction);
    font-size:11px; letter-spacing:.16em; text-transform:uppercase; text-align:center;
    transition:opacity 1s ease; pointer-events:none; }
  body[data-skin="dial"] #hint{ color:rgba(255,255,255,.4); }

  /* ---------- the password page ---------- */
  #veil{ position:fixed; inset:0; z-index:10; background:#000;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:26px;
    transition:opacity 1.1s ease; }
  #veil.dismiss{ opacity:0; pointer-events:none; }
  #lock{ opacity:.55; }
  #veil .title{ color:#d7d7db; font-size:15px; font-weight:500; letter-spacing:.26em; text-transform:uppercase; text-align:center; padding:0 20px; }
  #pw{ width:min(74vw,300px); height:46px; text-align:center; background:rgba(255,255,255,.04);
    border:1px solid #2c2c2e; border-radius:13px; color:#fff; font-family:var(--font);
    font-size:20px; letter-spacing:.5em; outline:none; caret-color:#8e8e93;
    transition:border-color .25s ease, transform .08s ease; }
  #pw:focus{ border-color:#48484a; }
  #pw.shake{ animation:shake .32s ease; }
  @keyframes shake{ 0%,100%{transform:translateX(0)} 20%{transform:translateX(-7px)} 40%{transform:translateX(7px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }

  /* info icon (bottom-left) + magician insert */
  #info{ position:absolute; left:16px; top:16px; width:30px; height:30px; border:none; background:transparent;
    color:#5a5a5e; cursor:pointer; opacity:.7; transition:opacity .25s ease; }
  #info:hover{ opacity:1; }
  #info svg{ width:100%; height:100%; display:block; }
  #infoCard{ position:absolute; left:14px; top:54px; max-width:min(78vw,300px);
    background:#161618; border:1px solid #2c2c2e; border-radius:12px; padding:14px 16px;
    color:#b8b8bd; font-size:13px; line-height:1.55; letter-spacing:.01em;
    opacity:0; transform:translateY(-6px); pointer-events:none; transition:opacity .25s ease, transform .25s ease; }
  #infoCard.show{ opacity:1; transform:translateY(0); }
  #infoCard b{ color:#e6e6ea; font-weight:600; }

  /* skin toggle (bottom-right) */
  #skinToggle{ position:absolute; right:16px; top:16px; display:flex; gap:2px;
    font-size:11px; letter-spacing:.14em; text-transform:uppercase; user-select:none; }
  #skinToggle button{ background:transparent; border:none; font:inherit; letter-spacing:inherit;
    color:#48484a; cursor:pointer; padding:4px 8px; border-radius:8px; transition:color .25s ease, background .25s ease; }
  #skinToggle button.on{ color:#d7d7db; background:rgba(255,255,255,.06); }

  /* footer (bottom-center) */
  #footer{ position:absolute; left:50%; bottom:16px; transform:translateX(-50%);
    color:#3a3a3c; font-size:11px; letter-spacing:.14em; white-space:nowrap; pointer-events:none; }

  /* mute (on the board) */
  #mute{ position:fixed; right:14px; bottom:12px; z-index:11; width:30px; height:30px; border:none;
    background:transparent; color:#3a3a3c; cursor:pointer; opacity:.6; transition:opacity .3s ease; display:none; }
  body.revealed #mute{ display:block; }
  body[data-skin="dial"] #mute{ color:rgba(255,255,255,.4); }
  #mute:hover{ opacity:1; }
  #mute svg{ display:block; width:100%; height:100%; }
</style>
</head>
<body>
  <div id="wrap">
    <div id="stage">
      <canvas id="presence"></canvas>
      <!-- Noir -->
      <div id="board"></div>
      <div id="planchette" aria-hidden="true"></div>
      <!-- Dial -->
      <div id="dialLayer" aria-hidden="true">
        <canvas id="dialStatic"></canvas>
        <canvas id="dialFace"></canvas>
        <canvas id="dialDyn"></canvas>
      </div>
      <div id="readout"><span id="readtext"></span><span id="caret"></span></div>
      <div id="hint">rest your fingertips on the planchette</div>
    </div>
  </div>

  <!-- Covert capture: the masked field hides the typed word from onlookers. -->
  <div id="veil">
    <svg id="lock" width="34" height="40" viewBox="0 0 34 40" fill="none" stroke="#8E8E93" stroke-width="1.4">
      <rect x="4" y="17" width="26" height="19" rx="4"/>
      <path d="M9 17 V11 a8 8 0 0 1 16 0 V17" fill="none"/>
      <circle cx="17" cy="25" r="2.2" fill="#8E8E93" stroke="none"/>
    </svg>
    <div class="title">Password Protected for safety</div>
    <input id="pw" type="text" inputmode="text" autocomplete="off" data-lpignore="true" data-1p-ignore
           autocapitalize="off" autocorrect="off" spellcheck="false" name="seal" aria-label="password">

    <button id="info" aria-label="instructions" title="Instructions">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="9.2"/><line x1="12" y1="11" x2="12" y2="16.5"/><circle cx="12" cy="7.6" r="0.9" fill="currentColor" stroke="none"/>
      </svg>
    </button>
    <div id="infoCard">This page is not password protected. just enter your participants secret word and press enter.</div>

    <div id="skinToggle" role="group" aria-label="board style">
      <button data-skin="noir" class="on">Noir</button>
      <button data-skin="dial">Dial</button>
    </div>

    <div id="footer">A webapp by Kenneth Aidan Foo</div>
  </div>

  <button id="mute" aria-label="toggle sound" title="Sound on/off">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 9v6h4l5 5V4L8 9H4z"/><path id="wave" d="M16 8.5a4.5 4.5 0 0 1 0 7" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
  </button>

<script>
"use strict";
(function(){
  /* ===== PARAMETERS — ported from the iOS app (AttitudeProfile.agitated) ===== */
  const ATT = { baseSpeed:280, letterDwell:[0.30,0.50], controlDwell:[1.00,1.40],
                wobbleAmp:4.8, wobbleFreq:3.4, overshootProb:0.72, overshootMag:15, speedVar:0.7 };
  const REF_W = 390;
  const TWO_PI = Math.PI*2;
  const rand=(a,b)=>a+Math.random()*(b-a);
  const clamp=(v,a,b)=>v<a?a:v>b?b:v;
  const dist=(p,q)=>Math.hypot(p.x-q.x,p.y-q.y);
  const lerp=(a,b,t)=>({x:a.x+(b.x-a.x)*t,y:a.y+(b.y-a.y)*t});
  const DPR=Math.min(window.devicePixelRatio||1,2);

  function makeWobble(){
    const oct=[]; for(let i=0;i<4;i++) oct.push({fx:rand(0.3,1.8),fy:rand(0.3,1.8),px:rand(0,TWO_PI),py:rand(0,TWO_PI),amp:rand(0.4,1)});
    const total=oct.reduce((s,o)=>s+o.amp,0)||1;
    return (t,amp)=>{ let x=0,y=0; for(const o of oct){ x+=Math.sin(t*o.fx*TWO_PI+o.px)*o.amp; y+=Math.cos(t*o.fy*TWO_PI+o.py)*o.amp; } const s=amp/total; return {x:x*s,y:y*s}; };
  }
  const shortestDelta=(from,to)=>{ let d=(to-from)%TWO_PI; if(d>Math.PI)d-=TWO_PI; if(d<-Math.PI)d+=TWO_PI; return d; };

  /* ===== AUDIO — procedural, no assets (AudioEngine.swift) ===== */
  const Audio=(function(){
    let ctx,sp,master,sr=44100,built=false,muted=false;
    let scrapeTarget=0,scrapeLevel=0,droneTarget=0,droneLevel=0; const scrapeVolume=0.7;
    let boardActive=false,duck=1; const artifactRate=8;
    let samplesUntilNext=0,artType=0,artPos=0,artLen=1,artAmp=0;
    let creakPhase=0,creakF0=100,creakF1=200,creakLP=0,creakVib=0,creakTrem=0;
    let p1=0,p2=0,p3=0,lfo=0,lp=0;
    function build(){ if(built)return true; const AC=window.AudioContext||window.webkitAudioContext; if(!AC)return false;
      ctx=new AC(); sr=ctx.sampleRate||44100; samplesUntilNext=Math.floor(sr*2);
      master=ctx.createGain(); master.gain.value=0.8; master.connect(ctx.destination);
      sp=ctx.createScriptProcessor(2048,1,1); sp.onaudioprocess=render; sp.connect(master); built=true; return true; }
    function render(e){
      const out=e.outputBuffer.getChannelData(0), n=out.length, active=boardActive;
      for(let i=0;i<n;i++){
        scrapeLevel+=(scrapeTarget-scrapeLevel)*0.0008; droneLevel+=(droneTarget-droneLevel)*0.0009;
        const white=Math.random()*2-1; lp+=0.06*(white-lp); let scrape=lp*scrapeLevel*0.72;
        p1+=TWO_PI*96.0/sr; if(p1>TWO_PI)p1-=TWO_PI; p2+=TWO_PI*99.5/sr; if(p2>TWO_PI)p2-=TWO_PI;
        p3+=TWO_PI*192.0/sr; if(p3>TWO_PI)p3-=TWO_PI; lfo+=TWO_PI*0.13/sr; if(lfo>TWO_PI)lfo-=TWO_PI;
        const lfoV=0.75+0.25*Math.sin(lfo);
        let drone=(Math.sin(p1)+Math.sin(p2)*0.7+Math.sin(p3)*0.25)*droneLevel*lfoV*0.5;
        let art=0;
        if(active){
          if(artType===0){ if(--samplesUntilNext<=0){ const roll=Math.floor(Math.random()*100);
            if(roll<45){ artType=1; artLen=Math.max(1,Math.floor(rand(0.02,0.10)*sr)); artAmp=rand(0.30,0.65); }
            else if(roll<68){ artType=2; artLen=Math.max(1,Math.floor(rand(0.05,0.22)*sr)); }
            else { artType=3; artLen=Math.max(1,Math.floor(rand(0.5,1.3)*sr)); artAmp=rand(0.18,0.36);
                   creakF0=rand(58,104); creakF1=creakF0*rand(0.82,1.06); creakPhase=0;creakLP=0;creakVib=0;creakTrem=0; }
            artPos=0; const mean=sr*60.0/artifactRate; samplesUntilNext=Math.max(1,Math.floor(mean*rand(0.45,1.7))); } }
          if(artType!==0){ const prog=artPos/artLen;
            if(artType===1){ art=(Math.random()*2-1)*Math.exp(-prog*9)*artAmp; }
            else if(artType===2){ duck=Math.max(0, prog<0.15?(1-prog/0.15):prog>0.85?((prog-0.85)/0.15):0); }
            else { const drift=creakF0+(creakF1-creakF0)*prog; const f=drift*(1+0.05*Math.sin(creakVib));
              creakPhase+=TWO_PI*f/sr; if(creakPhase>TWO_PI)creakPhase-=TWO_PI;
              creakVib+=TWO_PI*5.5/sr; if(creakVib>TWO_PI)creakVib-=TWO_PI;
              creakTrem+=TWO_PI*8.0/sr; if(creakTrem>TWO_PI)creakTrem-=TWO_PI;
              const grit=(Math.random()*2-1)*0.18; const tone=Math.sin(creakPhase)+0.35*Math.sin(creakPhase*2)+grit;
              creakLP+=0.08*(tone-creakLP); const trem=0.62+0.38*Math.sin(creakTrem);
              const env=Math.pow(Math.sin(prog*Math.PI),0.7); art=creakLP*env*trem*artAmp; }
            if(++artPos>=artLen){ artType=0; duck=1; } }
        } else { artType=0; duck=1; }
        out[i]=(scrape+drone)*duck+art;
      }
    }
    return {
      unlock(){ if(build())ctx.resume&&ctx.resume(); },
      beginBoard(){ if(build()){ ctx.resume&&ctx.resume(); boardActive=true; droneTarget=muted?0:0.30; } },
      setScrape(norm){ scrapeTarget=muted?0:clamp(norm,0,1)*0.85*scrapeVolume; },
      toggleMute(){ muted=!muted; if(master)master.gain.value=muted?0:0.8; if(droneTarget>0)droneTarget=muted?0:0.30; return muted; }
    };
  })();

  /* ===== DOM ===== */
  const stage=document.getElementById('stage');
  const boardEl=document.getElementById('board');
  const planEl=document.getElementById('planchette');
  const dialLayer=document.getElementById('dialLayer');
  const dialFaceCv=document.getElementById('dialFace');
  const dialDynCv=document.getElementById('dialDyn');
  const dialStaticCv=document.getElementById('dialStatic');
  const presenceCv=document.getElementById('presence');
  const pctx=presenceCv.getContext('2d');
  const readoutEl=document.getElementById('readout');
  const readtext=document.getElementById('readtext');
  const hintEl=document.getElementById('hint');

  const UPPER="ABCDEFGHIJKLM".split(""), LOWER="NOPQRSTUVWXYZ".split(""), DIGITS="1234567890".split("");
  const ALPHA="ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
  const INNER_DEG=[["0",348],["1",12],["2",36],["no",64],["3",92],["4",120],["5",148],["goodbye",180],["6",212],["7",240],["8",268],["yes",298],["9",326]];
  const ctrlDisplay=k=> k==="yes"?"YES" : k==="no"?"No" : k==="goodbye"?"GOODBYE" : k;

  let W=0,H=0,scale=1;
  let skin = (localStorage.getItem('ouija-skin')==='dial') ? 'dial' : 'noir';

  /* noir positions */
  let pos={}, idleCenter={x:0,y:0}; const glyphEls={};
  /* dial geometry */
  let dialC={x:0,y:0}, dialR=0, dialPR=0, dialItems=[], dialAngles={};
  let fctx,dctx,sctx;

  function setupCanvas(cv,w,h,dpr){ cv.width=Math.round(w*dpr); cv.height=Math.round(h*dpr);
    cv.style.width=w+'px'; cv.style.height=h+'px'; const c=cv.getContext('2d'); c.setTransform(dpr,0,0,dpr,0,0); return c; }

  function buildLayout(){
    const vw=window.innerWidth, vh=window.innerHeight;
    let h=Math.min(vh*0.99, vw*0.99/0.52); let w=h*0.52;
    W=Math.round(w); H=Math.round(h); scale=W/REF_W;
    stage.style.width=W+"px"; stage.style.height=H+"px";

    /* --- noir arc geometry (LetterLayout.swift) --- */
    const cx=W/2, cy=H*0.62, upperR=W*0.46, lowerR=W*0.345;
    const upSweep={s:152,e:28}, loSweep={s:149,e:31};
    const polar=(deg,r)=>({x:cx+r*Math.cos(deg*Math.PI/180), y:cy-r*Math.sin(deg*Math.PI/180)});
    pos={};
    UPPER.forEach((ch,i)=>{ const t=i/(UPPER.length-1); pos[ch]=polar(upSweep.s+t*(upSweep.e-upSweep.s),upperR); });
    LOWER.forEach((ch,i)=>{ const t=i/(LOWER.length-1); pos[ch]=polar(loSweep.s+t*(loSweep.e-loSweep.s),lowerR); });
    const digitArea=W*0.88, digitStartX=(W-digitArea)/2+digitArea/(DIGITS.length*2);
    const digitY=polar(loSweep.e,lowerR).y+46*scale;
    DIGITS.forEach((ch,i)=>{ pos[ch]={x:digitStartX+i*digitArea/DIGITS.length, y:digitY}; });
    const controlY=Math.max(digitY+56*scale, H*0.78);
    pos.yes={x:W*0.22,y:controlY}; pos.goodbye={x:W*0.50,y:controlY}; pos.no={x:W*0.78,y:controlY};
    idleCenter={x:W/2, y:cy-(upperR+lowerR)/2};

    /* --- dial geometry (DialLayout.swift) --- */
    const R=W*0.46, dc={x:W/2, y:H*0.46}, rOut=R*0.87, rIn=R*0.73;
    dialC=dc; dialR=R; dialPR=rOut; dialAngles={}; dialItems=[];
    const pt=(a,r)=>({x:dc.x+Math.sin(a)*r, y:dc.y-Math.cos(a)*r});
    ALPHA.forEach((ch,i)=>{ const a=i/26*TWO_PI; dialAngles[ch]=a; dialItems.push({key:ch,display:ch,angle:a,r:rOut,isControl:false}); });
    INNER_DEG.forEach(([key,deg])=>{ const a=deg*Math.PI/180; const isCtrl=!(key.length===1 && /[0-9]/.test(key));
      dialAngles[key]=a; dialItems.push({key,display:ctrlDisplay(key),angle:a,r:rIn,isControl:isCtrl}); });
    dialItems.forEach(it=>{ it.point=pt(it.angle,it.r); });

    renderNoirGlyphs();
    fctx=setupCanvas(dialFaceCv,W,H,DPR); dctx=setupCanvas(dialDynCv,W,H,DPR); sctx=setupCanvas(dialStaticCv,W,H,1);
    dialFaceDirty=true;

    layoutPresence(); layoutReadout(); buildPlanchetteSvg();
    if(engine.mode==='rest') resetToRest();
    else { engine.pos={x:clamp(engine.pos.x,10,W-10),y:clamp(engine.pos.y,10,H-10)}; }
    applySkinVisibility();
    drawFrame(0,true);
  }

  function renderNoirGlyphs(){
    boardEl.innerHTML="";
    const fL=(20*scale).toFixed(1)+"px", fD=(17*scale).toFixed(1)+"px", fC=(15*scale).toFixed(1)+"px";
    const add=(key,text,cls,fs)=>{ const el=document.createElement('div'); el.className=cls; el.textContent=text;
      el.style.left=pos[key].x+"px"; el.style.top=pos[key].y+"px"; el.style.fontSize=fs; boardEl.appendChild(el); glyphEls[key]=el; return el; };
    UPPER.concat(LOWER).forEach(ch=>add(ch,ch,"glyph letter",fL));
    DIGITS.forEach(ch=>add(ch,ch,"glyph digit",fD));
    const ctrl=(key,text)=>{ const el=add(key,text,"control",fC); el.style.padding=(9*scale)+"px "+(16*scale)+"px"; el.id=key; };
    ctrl("yes","Yes"); ctrl("no","No"); ctrl("goodbye","Goodbye");
  }
  function layoutPresence(){ const pw=Math.round(W*0.6), ph=Math.round(H*0.05);
    presenceCv.width=pw; presenceCv.height=ph; presenceCv.style.width=pw+"px"; presenceCv.style.height=ph+"px";
    presenceCv.style.top=(H*0.055)+"px"; seis.length=0; for(let i=0;i<Math.floor(pw/2);i++)seis.push(0); }
  function layoutReadout(){ readoutEl.style.top=(H*0.155)+"px"; readoutEl.style.fontSize=(26*scale).toFixed(1)+"px";
    document.getElementById('caret').style.height=(22*scale)+"px"; }

  function buildPlanchetteSvg(){
    const r=26*scale, halo=r+7*scale, box=(halo+4)*2;
    planEl.innerHTML='<svg width="'+box+'" height="'+box+'" viewBox="'+(-box/2)+' '+(-box/2)+' '+box+' '+box+'">'+
      '<circle r="'+halo+'" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="'+(0.8*scale)+'"/>'+
      '<circle r="'+r+'" fill="rgba(255,255,255,0.08)" stroke="#fff" stroke-width="'+(1*scale)+'"/>'+
      '<circle r="'+(2*scale)+'" fill="rgba(255,255,255,0.45)"/></svg>';
  }

  /* ---- highlighting (skin-aware) ---- */
  let activeKey=null, dialFaceDirty=true;
  function setActive(key){
    if(skin==='noir'){ if(activeKey&&glyphEls[activeKey])glyphEls[activeKey].classList.remove('active'); activeKey=key; if(glyphEls[key])glyphEls[key].classList.add('active'); }
    else { activeKey=key; dialFaceDirty=true; }
  }
  function markVisited(key){
    if(skin==='noir'){ if(glyphEls[key]){ glyphEls[key].classList.remove('active'); glyphEls[key].classList.add('visited'); } }
    else dialFaceDirty=true;
    if(activeKey===key) activeKey=null;
  }
  function clearHighlights(){
    Object.values(glyphEls).forEach(el=>el.classList.remove('active','visited'));
    activeKey=null; dialFaceDirty=true;
  }

  /* ===== ENGINE (PlanchetteEngine.swift, distilled; skin-aware) ===== */
  const travelWobble=makeWobble(), idleWobble=makeWobble();
  const engine={ skin, mode:'rest', pos:{x:0,y:0}, vel:0, clock:0, idlePhase:0, idleEndClock:0,
    angle:Math.PI, idleAngle:Math.PI,
    route:[], ri:0, segFrom:{x:0,y:0}, segLen:1, traveled:0, segSpeedMul:1, segStartAngle:0,
    dwelling:false, dwellT:0, dwellDur:0, fired:false, shudders:[],
    dwellRange:ATT.letterDwell, isSpelling:false, resolver:null, backToRestAt:0, trail:[] };

  const dialPoint=a=>({x:dialC.x+Math.sin(a)*dialPR, y:dialC.y-Math.cos(a)*dialPR});
  const nextSpeedMul=()=>Math.max(0.25,1+rand(-ATT.speedVar,ATT.speedVar));

  function resetToRest(){
    engine.mode='rest'; engine.vel=0; engine.route=[]; engine.trail=[]; clearHighlights();
    if(skin==='dial'){ engine.angle=dialAngles.goodbye; engine.idleAngle=engine.angle; engine.pos=dialPoint(engine.angle); }
    else engine.pos={...pos.goodbye};
  }

  /* ---- noir route ---- */
  function buildRoute(keys){
    const wp=[]; let prev={...engine.pos};
    for(const key of keys){ const tgt=pos[key]; if(!tgt)continue;
      if(wp.length&&wp[wp.length-1].key===key){ const mid={x:(prev.x+idleCenter.x)/2+rand(-22,22)*scale, y:(prev.y+idleCenter.y)/2+rand(-22,22)*scale, key:'', target:false}; wp.push(mid); prev=mid; }
      if(Math.random()<ATT.overshootProb){ const dx=tgt.x-prev.x,dy=tgt.y-prev.y,m=Math.hypot(dx,dy);
        if(m>20*scale){ const od=rand(4,ATT.overshootMag)*scale; wp.push({x:tgt.x+dx/m*od,y:tgt.y+dy/m*od,key:'',target:false}); } }
      wp.push({x:tgt.x,y:tgt.y,key,target:true}); prev=tgt; }
    return wp;
  }
  /* ---- dial route (startDialRoute) ---- */
  function buildDialRoute(keys){
    const out=[]; let cur=engine.angle;
    for(const key of keys){ const base=dialAngles[key]; if(base===undefined)continue;
      if(Math.random()<0.16+ATT.overshootProb*0.2){ const dir1=Math.random()<0.5?1:-1; const wayp=cur+dir1*rand(1.2,2.8); const dir2=-dir1;
        let raw=shortestDelta(wayp,base); if(raw!==0 && (raw>0?1:-1)!==dir2) raw+=dir2*TWO_PI; const tAbs=wayp+raw;
        out.push({angle:wayp,key:'',target:false}); out.push({angle:tAbs,key,target:true}); cur=tAbs; continue; }
      let d=shortestDelta(cur,base); const sign=d>=0?1:-1;
      if(Math.random()<ATT.overshootProb*0.6) d-=sign*TWO_PI; else if(Math.random()<ATT.overshootProb*0.4) d+=sign*TWO_PI;
      const tAbs=cur+d; out.push({angle:tAbs,key,target:true}); cur=tAbs; }
    return out;
  }

  function startRoute(keys,dwellRange,spelling){
    return new Promise(res=>{
      if(skin==='dial'){
        const route=buildDialRoute(keys); if(!route.length){res();return;}
        engine.route=route; engine.ri=0; engine.segStartAngle=engine.angle; engine.segSpeedMul=nextSpeedMul();
      } else {
        const route=buildRoute(keys); if(!route.length){res();return;}
        engine.route=route; engine.ri=0; engine.segFrom={...engine.pos};
        engine.segLen=Math.max(dist(engine.pos,route[0]),0.001); engine.traveled=0; engine.segSpeedMul=nextSpeedMul();
      }
      engine.trail=[]; engine.dwelling=false; engine.fired=false;
      engine.dwellRange=dwellRange; engine.isSpelling=!!spelling; engine.resolver=res; engine.mode='travel';
    });
  }
  function startIdle(seconds,randomize){
    return new Promise(res=>{
      engine.mode='idle'; engine.idleEndClock=engine.clock+seconds; engine.resolver=res;
      if(skin==='dial'){ engine.idleAngle = randomize ? engine.angle+shortestDelta(engine.angle,rand(0,TWO_PI)) : engine.angle; }
    });
  }

  function tickIdle(dt){
    engine.idlePhase+=dt;
    if(skin==='dial'){
      const wob=idleWobble(engine.idlePhase*0.8, ATT.wobbleAmp*2.0).x*0.006;
      const sway=Math.sin(engine.idlePhase*0.6)*0.09;
      const targetA=engine.idleAngle+sway+wob; const alpha=1-Math.pow(0.02,dt);
      const prev=engine.pos; engine.angle+=(targetA-engine.angle)*alpha; engine.pos=dialPoint(engine.angle);
      engine.vel=dist(prev,engine.pos)/Math.max(dt,0.001);
    } else {
      const w=idleWobble(engine.idlePhase*0.8, ATT.wobbleAmp*2.0*scale);
      const drift={x:Math.sin(engine.idlePhase*0.6)*W*0.08, y:Math.cos(engine.idlePhase*0.45)*H*0.04};
      const target={x:idleCenter.x+drift.x+w.x, y:idleCenter.y+drift.y+w.y}; const alpha=1-Math.pow(0.001,dt);
      const prev={...engine.pos}; engine.pos.x+=(target.x-engine.pos.x)*alpha; engine.pos.y+=(target.y-engine.pos.y)*alpha;
      engine.vel=dist(prev,engine.pos)/Math.max(dt,0.001);
    }
    if(engine.resolver&&engine.clock>=engine.idleEndClock){ const r=engine.resolver; engine.resolver=null; r(); }
  }

  function scheduleShudders(){
    engine.shudders=[]; const half=Math.max((engine.dwellDur-0.22)/2,0.01);
    if(Math.random()<0.6) engine.shudders.push({start:rand(0,half),mag:rand(0.03,0.06)});
    if(Math.random()<0.6) engine.shudders.push({start:half+rand(0,half),mag:rand(0.03,0.06)});
  }
  function shudderOffset(){ let s=0; const elapsed=engine.dwellDur-engine.dwellT;
    for(const ev of engine.shudders){ const p=(elapsed-ev.start)/0.22; if(p>=0&&p<=1) s+=Math.sin(p*Math.PI*5)*(1-p)*ev.mag; } return s; }

  function fireAt(key){ engine.fired=true; if(engine.isSpelling && key.length===1 && /[A-Z0-9]/.test(key)) addReadout(key); }
  function finishRoute(){ engine.route=[]; engine.mode='idle'; const r=engine.resolver; engine.resolver=null; if(r)r(); }

  function tickTravel(dt){
    const route=engine.route; if(!route.length){ finishRoute(); return; }
    if(skin==='dial') return tickTravelDial(dt,route);
    if(engine.dwelling){
      engine.dwellT-=dt; const seg=route[engine.ri];
      const w=travelWobble(engine.clock*ATT.wobbleFreq, ATT.wobbleAmp*0.5*scale);
      engine.pos={x:seg.x+w.x,y:seg.y+w.y}; engine.vel=0;
      if(!engine.fired&&engine.dwellT<engine.dwellDur/2) fireAt(seg.key);
      if(engine.dwellT<=0){ markVisited(seg.key); engine.ri++; if(engine.ri>=route.length){finishRoute();return;}
        engine.dwelling=false; engine.fired=false; engine.segFrom={x:seg.x,y:seg.y};
        engine.segLen=Math.max(dist(engine.segFrom,route[engine.ri]),0.001); engine.traveled=0; engine.segSpeedMul=nextSpeedMul(); }
      return;
    }
    const target=route[engine.ri];
    let frac=clamp(engine.traveled/engine.segLen,0,1); const ease=0.35+0.85*Math.sin(frac*Math.PI);
    engine.traveled+=ATT.baseSpeed*scale*engine.segSpeedMul*ease*dt; frac=clamp(engine.traveled/engine.segLen,0,1);
    const base=lerp(engine.segFrom,target,frac); const w=travelWobble(engine.clock*ATT.wobbleFreq, ATT.wobbleAmp*scale);
    const prev={...engine.pos}; engine.pos={x:base.x+w.x,y:base.y+w.y}; engine.vel=dist(prev,engine.pos)/Math.max(dt,0.001);
    if(frac>=1){ if(target.target){ setActive(target.key); engine.dwellDur=rand(engine.dwellRange[0],engine.dwellRange[1]); engine.dwellT=engine.dwellDur; engine.dwelling=true; engine.fired=false; }
      else { engine.ri++; engine.segFrom={x:target.x,y:target.y}; engine.segLen=Math.max(dist(engine.segFrom,route[engine.ri]),0.001); engine.traveled=0; engine.segSpeedMul=nextSpeedMul(); } }
  }

  function tickTravelDial(dt,route){
    if(engine.dwelling){
      engine.dwellT-=dt; const seg=route[engine.ri];
      const wob=travelWobble(engine.clock*ATT.wobbleFreq, ATT.wobbleAmp*0.5).x*0.004;
      engine.angle=seg.angle+wob+shudderOffset(); engine.pos=dialPoint(engine.angle); engine.vel=0;
      if(!engine.fired&&engine.dwellT<engine.dwellDur/2) fireAt(seg.key);
      if(engine.dwellT<=0){ markVisited(seg.key); engine.ri++; if(engine.ri>=route.length){finishRoute();return;}
        engine.dwelling=false; engine.fired=false; engine.segStartAngle=engine.angle; engine.segSpeedMul=nextSpeedMul(); }
      return;
    }
    const seg=route[engine.ri], ta=seg.angle, total=ta-engine.segStartAngle;
    const frac=Math.abs(total)<1e-4?1:clamp((engine.angle-engine.segStartAngle)/total,0,1);
    const ease=0.35+0.85*Math.sin(frac*Math.PI);
    const flux=Math.max(0.3, 1+0.5*Math.sin(engine.clock*5+engine.segStartAngle)+0.28*Math.sin(engine.clock*12.3+1.7));
    const angSpeed=(ATT.baseSpeed*scale/Math.max(dialPR,1))*ease*engine.segSpeedMul*flux;
    const step=angSpeed*dt, remaining=ta-engine.angle;
    if(Math.abs(remaining)<=step||Math.abs(remaining)<0.001) engine.angle=ta; else engine.angle+=remaining>0?step:-step;
    const wob=travelWobble(engine.clock*ATT.wobbleFreq, ATT.wobbleAmp).x*0.003;
    const prev=engine.pos; engine.pos=dialPoint(engine.angle+wob); engine.vel=dist(prev,engine.pos)/Math.max(dt,0.001);
    if(engine.trail.length===0||dist(engine.pos,engine.trail[engine.trail.length-1])>6){ engine.trail.push({...engine.pos}); if(engine.trail.length>120)engine.trail.shift(); }
    if(engine.angle===ta){
      if(!seg.target){ engine.ri++; engine.segStartAngle=engine.angle; engine.segSpeedMul=nextSpeedMul(); if(engine.ri>=route.length){finishRoute();} return; }
      setActive(seg.key); engine.dwellDur=rand(engine.dwellRange[0],engine.dwellRange[1]); engine.dwellT=engine.dwellDur; engine.dwelling=true; engine.fired=false; scheduleShudders();
    }
  }

  function tickDoneIdle(dt){ tickIdle(dt); if(engine.clock>=engine.backToRestAt){ engine.mode='rest'; engine.vel=0; } }

  /* ---- readout ---- */
  let readoutStr=""; function addReadout(ch){ readoutStr+=ch; readtext.textContent=readoutStr; }

  /* ---- presence seismograph ---- */
  const seis=[]; let agitation=0;
  function drawPresence(){ const w=presenceCv.width,h=presenceCv.height,mid=h/2;
    pctx.clearRect(0,0,w,h); pctx.strokeStyle = skin==='dial'?"rgba(255,255,255,0.5)":"rgba(142,142,147,0.9)";
    pctx.lineWidth=Math.max(1,scale); pctx.beginPath(); const step=w/(seis.length-1);
    for(let i=0;i<seis.length;i++){ const x=i*step,y=mid-seis[i]*mid*0.92; i===0?pctx.moveTo(x,y):pctx.lineTo(x,y); } pctx.stroke(); }
  function pushPresence(){ const v=clamp(engine.vel/(300*scale),0,1); agitation+=(v-agitation)*0.2;
    const a=Math.max(agitation,0.05); seis.push((Math.random()*2-1)*a*(0.6+Math.random()*0.4));
    if(seis.length>Math.floor(presenceCv.width/2))seis.shift(); }

  /* ---- dial rendering ---- */
  function dialFont(it){ const R=dialR; if(!it.isControl) return /[0-9]/.test(it.key)?[R*0.092,300]:[R*0.105,300];
    return it.key==="goodbye"?[R*0.052,600]:[R*0.082,600]; }
  function drawGlyph(c,it,color,glow,glowBlur){ const [sz,wt]=dialFont(it);
    c.save(); c.translate(it.point.x,it.point.y); c.rotate(it.angle);
    c.font=wt+" "+sz.toFixed(1)+"px "+getComputedStyle(document.body).fontFamily;
    c.textAlign="center"; c.textBaseline="middle"; c.fillStyle=color;
    if(glow){ c.shadowColor=glow; c.shadowBlur=glowBlur; } c.fillText(it.display,0,0); c.restore(); }
  function drawDialFace(){ fctx.clearRect(0,0,W,H);
    for(const it of dialItems){ const active=it.key===activeKey;
      drawGlyph(fctx, it, active?"#B3A6E0":"rgba(255,255,255,0.82)", active?"#B3A6E0":null, 8); }
    dialFaceDirty=false; }
  function drawDialDyn(){
    dctx.clearRect(0,0,W,H); const R=dialR,c=dialC,a=engine.angle;
    // arc-sweep trail
    if(engine.trail.length>1){ for(let i=1;i<engine.trail.length;i++){ const alpha=i/engine.trail.length*0.16;
      dctx.strokeStyle="rgba(178,34,34,"+alpha.toFixed(3)+")"; dctx.lineWidth=1.5; dctx.beginPath();
      dctx.moveTo(engine.trail[i-1].x,engine.trail[i-1].y); dctx.lineTo(engine.trail[i].x,engine.trail[i].y); dctx.stroke(); } }
    // sweep glow on nearby glyphs
    for(const it of dialItems){ const ad=Math.abs(Math.atan2(Math.sin(a-it.angle),Math.cos(a-it.angle))); if(ad>=0.16)continue;
      const intensity=1-ad/0.16; drawGlyph(dctx, it, "rgba(179,166,224,"+(0.25+0.6*intensity).toFixed(3)+")", "rgba(179,166,224,"+(0.9*intensity).toFixed(3)+")", 9*intensity); }
    // needle
    const dir={x:Math.sin(a),y:-Math.cos(a)}, perp={x:Math.cos(a),y:Math.sin(a)};
    const P=(al,si)=>({x:c.x+dir.x*al+perp.x*si, y:c.y+dir.y*al+perp.y*si});
    const tipR=R*0.80,bh=R*0.013,th=R*0.004,tailR=R*0.26,starR=R*0.03;
    dctx.save(); dctx.shadowColor="rgba(178,34,34,0.9)"; dctx.shadowBlur=9; dctx.fillStyle="#B22222";
    dctx.beginPath(); let p=P(0,bh); dctx.moveTo(p.x,p.y); p=P(0,-bh);dctx.lineTo(p.x,p.y); p=P(tipR,-th);dctx.lineTo(p.x,p.y); p=P(tipR,th);dctx.lineTo(p.x,p.y); dctx.closePath(); dctx.fill();
    dctx.beginPath(); for(let k=0;k<8;k++){ const aa=a+k*Math.PI/4, rr=(k%2===0)?starR:starR*0.4;
      const px=(c.x+dir.x*tipR)+Math.sin(aa)*rr, py=(c.y+dir.y*tipR)-Math.cos(aa)*rr; k===0?dctx.moveTo(px,py):dctx.lineTo(px,py); } dctx.closePath(); dctx.fill();
    dctx.restore();
    dctx.fillStyle="rgba(178,34,34,0.5)"; dctx.beginPath(); p=P(0,bh*0.7);dctx.moveTo(p.x,p.y); p=P(0,-bh*0.7);dctx.lineTo(p.x,p.y); p=P(-tailR,0);dctx.lineTo(p.x,p.y); dctx.closePath(); dctx.fill();
    dctx.fillStyle="rgba(255,255,255,0.85)"; dctx.beginPath(); dctx.arc(c.x,c.y,R*0.046,0,TWO_PI); dctx.fill();
    dctx.fillStyle="#060607"; dctx.beginPath(); dctx.arc(c.x,c.y,R*0.02,0,TWO_PI); dctx.fill();
  }
  let staticTick=0;
  function drawDialStatic(){ staticTick++; if(staticTick%6!==0)return; sctx.clearRect(0,0,W,H);
    const count=Math.floor(W*H/900); for(let i=0;i<count;i++){ const x=Math.random()*W,y=Math.random()*H,al=Math.random()*0.06;
      sctx.fillStyle="rgba(255,255,255,"+al.toFixed(3)+")"; sctx.fillRect(x,y,1.3,1.3); } }

  /* ---- planchette (noir) ---- */
  function drawPlanchette(){ planEl.style.left=engine.pos.x+"px"; planEl.style.top=engine.pos.y+"px";
    const g=clamp(engine.vel/(300*scale),0,1);
    planEl.style.filter="drop-shadow(0 0 "+(6+g*16).toFixed(1)+"px rgba(255,255,255,"+(0.25+g*0.4).toFixed(2)+"))"; }

  /* ===== MAIN LOOP ===== */
  let last=0;
  function frame(ts){ const t=ts/1000; const dt=last===0?0.016:Math.min(t-last,0.05); last=t; engine.clock=t; drawFrame(dt,false); requestAnimationFrame(frame); }
  function drawFrame(dt,forceDraw){
    if(!forceDraw){ switch(engine.mode){ case 'idle':tickIdle(dt);break; case 'travel':tickTravel(dt);break; case 'done-idle':tickDoneIdle(dt);break; default:engine.vel=0; } }
    Audio.setScrape(engine.vel/(300*scale));
    if(skin==='dial'){ if(dialFaceDirty)drawDialFace(); drawDialDyn(); drawDialStatic(); }
    else drawPlanchette();
    pushPresence(); drawPresence();
  }

  /* ===== ROUTINE — the fixed 7-part séance ===== */
  let secretLetters=[]; let started=false;
  async function runRoutine(){
    if(started)return; started=true; hintEl.style.opacity=0;
    await startIdle(5,true);
    await startRoute(["yes"], ATT.controlDwell, false);
    await startIdle(5,true);
    await startRoute(["no"], ATT.controlDwell, false);
    await startIdle(6,true);
    if(secretLetters.length){ readoutEl.classList.add('writing'); await startRoute(secretLetters, ATT.letterDwell, true); readoutEl.classList.remove('writing'); }
    await startRoute(["goodbye"], ATT.controlDwell, false);
    engine.mode='rest';
  }
  function onGrab(e){ e.preventDefault(); Audio.unlock();
    if(!started){ runRoutine(); }
    else if(engine.mode==='rest'){ engine.mode='done-idle'; engine.idlePhase=0; if(skin==='dial')engine.idleAngle=engine.angle; engine.backToRestAt=engine.clock+rand(3.5,5.5); } }
  planEl.addEventListener('pointerdown',onGrab,{passive:false});
  dialLayer.addEventListener('pointerdown',onGrab,{passive:false});

  /* ===== SKIN ===== */
  function applySkinVisibility(){
    const dial = skin==='dial';
    boardEl.style.display = dial?'none':'block';
    planEl.style.display = dial?'none':'block';
    dialLayer.style.display = dial?'block':'none';
    document.body.dataset.skin = skin;
    hintEl.textContent = dial ? 'rest your fingertips on the dial' : 'rest your fingertips on the planchette';
  }
  function setSkin(s){ if(s===skin)return; skin=s; engine.skin=s; localStorage.setItem('ouija-skin',s);
    document.querySelectorAll('#skinToggle button').forEach(b=>b.classList.toggle('on', b.dataset.skin===s));
    readoutStr=""; readtext.textContent=""; clearHighlights(); applySkinVisibility(); resetToRest(); drawFrame(0,true); }
  document.querySelectorAll('#skinToggle button').forEach(b=> b.addEventListener('click',()=>setSkin(b.dataset.skin)) );
  document.querySelectorAll('#skinToggle button').forEach(b=>b.classList.toggle('on', b.dataset.skin===skin));

  /* ===== THE PASSWORD PAGE ===== */
  const veil=document.getElementById('veil'), pw=document.getElementById('pw');
  setTimeout(()=>pw.focus(),350);
  // Covert field: the real word lives in `secret`; the field shows password dots.
  // On touch devices the native password field briefly flashes the REAL last
  // character before masking it (that's what leaked the word) — so we mask it
  // ourselves and flash a FAKE letter instead, then a dot. On desktop (no touch)
  // it's just dots immediately, like a normal password field.
  let secret="";
  const isTouch=(navigator.maxTouchPoints||0)>0 || /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent||'');
  let revealTimer=null, fakeChar="";
  function fakeFor(ch){
    const pool = /[0-9]/.test(ch) ? "0123456789" : /[A-Z]/.test(ch) ? "ABCDEFGHIJKLMNOPQRSTUVWXYZ" : "abcdefghijklmnopqrstuvwxyz";
    let f; do{ f=pool[Math.floor(Math.random()*pool.length)]; }while(f===ch && pool.length>1); return f;
  }
  function renderMask(showFake){ const n=secret.length; pw.value=(showFake&&n>0)?"•".repeat(n-1)+fakeChar:"•".repeat(n); }
  pw.addEventListener('beforeinput',e=>{
    const t=e.inputType||'';
    if(t.indexOf('insert')===0){
      let data=e.data; if(data==null && e.dataTransfer) data=e.dataTransfer.getData('text');
      if(data){ e.preventDefault(); for(const ch of data) secret+=ch; clearTimeout(revealTimer);
        if(isTouch){ fakeChar=fakeFor(data[data.length-1]); renderMask(true); revealTimer=setTimeout(()=>renderMask(false),1100); }
        else renderMask(false);
      }
    } else if(t.indexOf('delete')===0){ e.preventDefault(); clearTimeout(revealTimer); secret=secret.slice(0,-1); renderMask(false); }
  });
  function commune(){ Audio.unlock(); clearTimeout(revealTimer); const word=secret; secret=""; pw.value="";
    secretLetters=word.toUpperCase().split("").filter(c=>/[A-Z0-9]/.test(c));
    veil.classList.add('dismiss'); setTimeout(()=>{veil.style.display='none';},1200);
    document.body.classList.add('revealed');
    Audio.beginBoard(); hintEl.style.opacity=1; }
  pw.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); commune(); } });
  veil.addEventListener('pointerdown',e=>{ if(!veil.classList.contains('dismiss') && e.target.closest('#info,#infoCard,#skinToggle')===null) pw.focus(); });

  /* info insert */
  const info=document.getElementById('info'), infoCard=document.getElementById('infoCard');
  info.addEventListener('click',e=>{ e.stopPropagation(); infoCard.classList.toggle('show'); });
  document.addEventListener('click',e=>{ if(!e.target.closest('#info,#infoCard')) infoCard.classList.remove('show'); });

  /* mute */
  document.getElementById('mute').addEventListener('click',()=>{ const m=Audio.toggleMute();
    document.getElementById('mute').style.opacity=m?0.3:0.6; document.getElementById('wave').style.display=m?'none':''; });

  /* ===== BOOT ===== */
  buildLayout();
  let rzT; window.addEventListener('resize',()=>{ clearTimeout(rzT); rzT=setTimeout(buildLayout,120); });
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
